<!doctype html>

<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dashboard — SkillNest AI</title>
  <meta name="description" content="SkillNest AI secure dashboard." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Space+Grotesk:wght@400;700&amp;display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; background: #08111F; color: #F8FAFC; }
    .glass { background: rgba(15, 23, 42, 0.7); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); }
  </style>
</head>
<body>
  <script>
    (async () => {
      const user = await window.GizoAuth?.getUser?.();
      if (!user) window.location.href = '/login';
    })();
  </script>

  <div class="flex min-h-screen">
    <aside class="w-64 border-r border-white/10 p-6 hidden md:block">
      <div class="text-xl font-bold font-['Space_Grotesk'] mb-8">SkillNest AI</div>
      <nav class="space-y-4">
        <a href="/dashboard" class="block p-3 rounded-xl bg-white/5 font-medium">Dashboard</a>
        <a href="/app" class="block p-3 text-slate-400 hover:text-white">Workspace</a>
        <a href="/reports" class="block p-3 text-slate-400 hover:text-white">Reports</a>
        <a href="/admin" class="block p-3 text-slate-400 hover:text-white">Admin</a>
        <a href="/admin/integrations" class="block p-3 text-slate-400 hover:text-white">Integrations</a>
        <a href="/admin/api-keys" class="block p-3 text-slate-400 hover:text-white">API Key Manager</a>
      </nav>
      <button id="signOutBtn" class="absolute bottom-6 text-sm text-slate-500 hover:text-red-400 transition-colors">Sign out</button>
    </aside>

    <main class="flex-1 p-8">
      <header class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold font-['Space_Grotesk']">Dashboard</h1>
        <button id="refreshBtn" class="px-4 py-2 bg-white/5 rounded-xl text-sm hover:bg-white/10 transition-colors">Refresh Data</button>
      </header>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="glass p-6 rounded-2xl">
          <p class="text-slate-400 text-sm uppercase tracking-wider text-xs">Total Records</p>
          <h2 id="totalCount" class="text-3xl font-bold mt-2">0</h2>
        </div>
        <div class="glass p-6 rounded-2xl">
          <p class="text-slate-400 text-sm uppercase tracking-wider text-xs">Active Tasks</p>
          <h2 id="activeCount" class="text-3xl font-bold mt-2">0</h2>
        </div>
        <div class="glass p-6 rounded-2xl">
          <p class="text-slate-400 text-sm uppercase tracking-wider text-xs">System Status</p>
          <h2 class="text-3xl font-bold text-emerald-400 mt-2">Online</h2>
        </div>
      </div>

      <div class="glass rounded-2xl overflow-hidden border border-white/10">
        <table class="w-full text-left">
          <thead class="border-b border-white/10 bg-white/5">
            <tr>
              <th class="p-4 text-sm font-medium text-slate-400">Title</th>
              <th class="p-4 text-sm font-medium text-slate-400">Status</th>
            </tr>
          </thead>
          <tbody id="dataTable">
            <tr><td colspan="2" class="p-8 text-center text-slate-500">Loading data...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script>
    async function loadData() {
      const tbody = document.getElementById('dataTable');
      try {
        const data = await window.GizoData.list('records', { limit: 10 });
        document.getElementById('totalCount').textContent = data.length;
        document.getElementById('activeCount').textContent = data.filter(i => i.data?.status !== 'done').length;
        
        if (data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="2" class="p-8 text-center text-slate-500">No records found.</td></tr>';
        } else {
          tbody.innerHTML = data.map(item => `
            <tr class="border-b border-white/5 hover:bg-white/5 transition-colors">
              <td class="p-4 font-medium">${item.data.title || 'Untitled'}</td>
              <td class="p-4 text-slate-400 capitalize">${item.data.status || 'pending'}</td>
            </tr>
          `).join('');
        }
      } catch (e) {
        tbody.innerHTML = '<tr><td colspan="2" class="p-8 text-center text-red-400">Error loading data.</td></tr>';
      }
    }

    document.getElementById('refreshBtn').addEventListener('click', loadData);
    document.getElementById('signOutBtn').addEventListener('click', async () => {
      await window.GizoAuth.logout();
      window.location.href = '/login';
    });

    loadData();
  </script>
</body>
</html>
