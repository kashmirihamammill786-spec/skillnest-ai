<!doctype html>

<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - Gizo One</title>
  <meta name="description" content="Login to your Gizo One workspace" />
  <meta property="og:title" content="Login - Gizo One" />
  <meta property="og:description" content="Access your Gizo One AI workspace." />
  <meta property="og:type" content="website" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@600&amp;display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; background: #08111F; color: #F8FAFC; }
    h1, h2 { font-family: 'Space Grotesk', sans-serif; }
    .golden-ring { 
        background: linear-gradient(#08111F, #08111F) padding-box, 
                    linear-gradient(to right, #F59E0B, #A3E635, #F59E0B) border-box;
        border: 2px solid transparent;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <nav class="border-b border-white/5 p-4 bg-[#08111F]/80 backdrop-blur-md sticky top-0 z-50">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
      <a href="/" class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-full golden-ring flex items-center justify-center">
            <span class="text-[10px] font-bold text-yellow-500">G1</span>
        </div>
        <span class="text-xl font-bold tracking-tight">Gizo<span class="text-yellow-500">One</span></span>
      </a>
      <div class="space-x-6 text-sm font-medium text-slate-400">
        <a href="/" class="hover:text-white transition">Home</a>
        <a href="/dashboard" class="hover:text-white transition">Dashboard</a>
        <a href="/login" class="text-white border-b border-yellow-500 pb-0.5">Login</a>
        <a href="/signup" class="bg-yellow-500/10 text-yellow-500 px-4 py-2 rounded-xl hover:bg-yellow-500/20 transition">Signup</a>
      </div>
    </div>
  </nav>

  <main class="flex-grow flex flex-col items-center justify-center p-6 space-y-8">
    <div class="w-full max-w-md bg-slate-900/50 border border-white/5 p-8 rounded-3xl shadow-2xl backdrop-blur-sm">
      <div class="text-center mb-8">
          <h1 class="text-3xl font-bold mb-2">Welcome back</h1>
          <p class="text-slate-400 text-sm">Sign in to your Gizo One environment</p>
      </div>
      <form data-gizo-auth="login" data-gizo-redirect="/dashboard" class="space-y-5">
        <div>
          <label for="email" class="block text-[10px] uppercase tracking-widest text-slate-500 mb-2 font-bold">Email Address</label>
          <input type="email" id="email" name="email" required class="w-full bg-slate-950 border border-white/10 rounded-xl p-3.5 focus:ring-2 focus:ring-yellow-500/50 outline-none transition" />
        </div>
        <div>
          <label for="pw" class="block text-[10px] uppercase tracking-widest text-slate-500 mb-2 font-bold">Password</label>
          <div class="relative">
            <input type="password" name="password" id="pw" required class="w-full bg-slate-950 border border-white/10 rounded-xl p-3.5 pr-16 focus:ring-2 focus:ring-yellow-500/50 outline-none transition" />
            <button type="button" id="pw-toggle" class="absolute right-4 top-4 text-[10px] text-slate-500 hover:text-yellow-500 uppercase font-bold tracking-wider">Show</button>
          </div>
        </div>
        <div class="flex items-center justify-between text-xs text-slate-400">
          <label class="flex items-center gap-2"><input type="checkbox" name="remember" class="accent-yellow-500 rounded" /> Remember me</label>
          <a href="/forgot" class="hover:text-yellow-500 transition">Forgot password?</a>
        </div>
        <button type="submit" class="w-full bg-gradient-to-r from-yellow-500 to-amber-600 p-3.5 rounded-xl font-bold text-black hover:brightness-110 transition shadow-lg shadow-yellow-500/10">Sign in</button>
        <p data-gizo-status role="status" class="text-sm text-center text-red-400 mt-4"></p>
      </form>
      <p class="mt-8 text-center text-sm text-slate-500">Don't have an account? <a href="/signup" class="text-yellow-500 font-semibold hover:underline">Create workspace</a></p>
    </div>
  </main>

  <footer class="p-8 border-t border-white/5 text-center">
    <div class="max-w-6xl mx-auto">
      <p class="text-slate-600 text-sm font-medium">© 2024 Gizo One. All rights reserved.</p>
    </div>
  </footer>

  <script>
    document.getElementById('pw-toggle').addEventListener('click', function(e) {
      const i = document.getElementById('pw');
      if (i.type === 'password') {
        i.type = 'text';
        this.textContent = 'Hide';
      } else {
        i.type = 'password';
        this.textContent = 'Show';
      }
    });
  </script>
</body>
</html>
