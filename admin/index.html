<!doctype html>

<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Dashboard | SkillNest AI</title>
  <meta name="description" content="Secure administrative control panel for system configuration and management." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Space+Grotesk:wght@500;600;700&amp;display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #08111F; color: #F8FAFC; }
    h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; }
    .glass { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(8px); }
    .nav-link { transition: all 0.2s; display: block; padding: 0.75rem; border-radius: 0.5rem; color: #94a3b8; }
    .nav-link:hover { color: #fff; background: rgba(255,255,255,0.05); }
    .nav-link.active { color: #22d3ee; background: rgba(6, 182, 212, 0.1); border-left: 2px solid #06B6D4; }
  </style>
</head>
<body class="min-h-screen">
  <script>
    (async function initApp() {
      // Force navigation validation check
      const user = await window.GizoAuth?.getUser?.();
      if (!user) { window.location.href = '/login'; return; }
      if (user.metadata?.role !== 'admin') {
        document.body.innerHTML = '<div class="flex items-center justify-center h-screen text-center"><div class="glass p-8 rounded-2xl"><h2 class="text-2xl font-bold mb-2">Access Denied</h2><p class="text-slate-400">Admin privileges required.</p><a href="/" class="mt-4 block text-cyan-400 underline">Return to Home</a></div></div>';
        return;
      }

      document.getElementById('logout-btn')?.addEventListener('click', async () => {
        await window.GizoAuth.logout();
        window.location.href = '/login';
      });

      try {
        const userCount = await window.GizoData.count('users', {});
        document.getElementById('stat-users').textContent = userCount.toLocaleString();
        
        const logs = await window.GizoData.list('audit_log', { limit: 5, order: { created_at: 'desc' } });
        const feed = document.getElementById('audit-feed');
        if (logs?.length > 0) {
          feed.innerHTML = logs.map(log => `
            <div class="flex items-center justify-between p-4 bg-white/5 rounded-xl border border-white/5">
              <div>
                <p class="text-sm font-medium text-slate-200">${log.data.action || 'System operation'}</p>
                <p class="text-xs text-slate-500">ID: ${log.id.slice(0,8)}</p>
              </div>
              <span class="text-xs text-slate-500">${new Date(log.created_at).toLocaleDateString()}</span>
            </div>
          `).join('');
        }
      } catch (e) { console.error('Data error:', e); }
    })();
  </script>

  <div class="flex min-h-screen">
    <aside class="w-64 border-r border-white/10 p-6 hidden md:flex flex-col bg-[#050a14]">
      <div class="font-display font-bold text-xl mb-10 text-cyan-400">SkillNest AI</div>
      <nav class="space-y-2 flex-1">
        <a href="/dashboard" class="nav-link">Dashboard</a>
        <a href="/admin" class="nav-link active">Admin Panel</a>
        <a href="/admin/integrations" class="nav-link">Integrations</a>
        <a href="/admin/api-keys" class="nav-link">API Keys</a>
        <a href="/settings" class="nav-link">Settings</a>
      </nav>
      <div class="mt-auto pt-6 border-t border-white/10">
        <button id="logout-btn" class="text-xs text-red-400 hover:text-red-300">Sign Out</button>
      </div>
    </aside>

    <main class="flex-1 w-full p-6 md:p-12">
      <header class="mb-8">
        <h1 class="text-3xl font-bold text-white tracking-tight">Admin Overview</h1>
        <p class="text-slate-400">Manage infrastructure, user access, and system security.</p>
      </header>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
        <div class="glass p-6 rounded-2xl">
          <p class="text-slate-400 text-sm">Active Users</p>
          <h3 class="text-2xl font-bold mt-2" id="stat-users">--</h3>
        </div>
        <div class="glass p-6 rounded-2xl">
          <p class="text-slate-400 text-sm">System Status</p>
          <h3 class="text-2xl font-bold mt-2 text-emerald-400">Operational</h3>
        </div>
        <div class="glass p-6 rounded-2xl">
          <p class="text-slate-400 text-sm">Available Credits</p>
          <h3 class="text-2xl font-bold mt-2">98,420</h3>
        </div>
      </div>

      <div class="glass rounded-2xl p-8">
        <h2 class="text-xl font-semibold mb-6">Recent System Audit</h2>
        <div class="space-y-4" id="audit-feed">
          <div class="text-slate-500 text-sm italic">Loading system logs...</div>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
